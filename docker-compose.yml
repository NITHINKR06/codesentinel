version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sentinel:sentinel@db:5432/codesentinel
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://sentinel:sentinel@db:5432/codesentinel
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: celery -A workers.celery_app worker --loglevel=info

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=codesentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  demo-sqli:
    build: ./backend/demo-targets
    environment:
      - TARGET_TYPE=sqli
    ports:
      - "8101:5000"

  demo-xss:
    build: ./backend/demo-targets
    environment:
      - TARGET_TYPE=xss
    ports:
      - "8102:5000"

  demo-path:
    build: ./backend/demo-targets
    environment:
      - TARGET_TYPE=path_traversal
    ports:
      - "8103:5000"

  demo-ssrf:
    build: ./backend/demo-targets
    environment:
      - TARGET_TYPE=ssrf
    ports:
      - "8104:5000"

  demo-rce:
    build: ./backend/demo-targets
    environment:
      - TARGET_TYPE=rce
    ports:
      - "8105:5000"

volumes:
  pgdata:
  ollama_data:
